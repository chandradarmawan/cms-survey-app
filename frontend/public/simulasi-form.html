  if(f.sumber==='SISTEM') return '20 Jun 2026';

  if(n.includes('kontrak')) return 'KTR-2026-00417';
  if(n.includes('npwp')) return '01.234.567.8-051.000';

  if(n.includes('negara')) return 'Singapura';
  return 'Lookup dari database Pelindo';

      {kode:'C1',parent:null,teks:'Pelayanan umum',tipe:'GRUP'},
      {kode:'C1.1',parent:'C1',teks:'Kebersihan & kenyamanan fasilitas pelabuhan',tipe:'SKALA_KEPUASAN',wajib:true,scaleId:'scl_puas4'},
      {kode:'C1.2',parent:'C1',teks:'Keramahan & kesigapan petugas',tipe:'SKALA_KEPUASAN',wajib:true,scaleId:'scl_puas4'},
      {kode:'C1.3',parent:'C1',teks:'Kecepatan proses layanan',tipe:'SKALA_KEPUASAN',wajib:true,scaleId:'scl_puas4'},
      {kode:'C2',parent:null,teks:'Seberapa besar kemungkinan Anda merekomendasikan Pelindo?',tipe:'NPS',wajib:true,scaleId:'scl_nps'},
      {kode:'C3',parent:null,teks:'Secara keseluruhan saya puas dengan layanan Pelindo',tipe:'SKALA_PERSETUJUAN',wajib:true,scaleId:'scl_setuju4'},
      {kode:'C4',parent:null,teks:'Apakah Anda berencana menggunakan layanan Pelindo kembali?',tipe:'YA_TIDAK',wajib:true},
      {kode:'C5',parent:null,teks:'Saran perbaikan untuk tahun berikutnya',tipe:'TEKS'},
    ],
  },
];

/* ---------- State per view ---------- */
const STATE = {};
const getState = (id)=> (STATE[id] ||= {answers:{}, identity:{}, errors:{}, submitted:null});

/* ---------- Logika & validasi ---------- */
function answerVal(a){ if(!a) return undefined; if(a.text!=null&&a.text!=='') return a.text; if(a.number!=null) return String(a.number); if(a.json&&a.json.length) return a.json.join('|'); return undefined; }
function visible(q,s){ if(!q.logic) return true; const v=answerVal(s.answers[q.logic.src]); return v===q.logic.val; }
function empty(a){ if(!a) return true; if(a.text!=null) return a.text.trim()===''; if(a.number!=null) return false; if(a.json) return a.json.length===0; return true; }

/* ---------- Render kontrol pertanyaan ---------- */
function stars(filled,total){ let h=''; for(let i=0;i<total;i++) h+=`<span class="star ${i<filled?'on':''}">★</span>`; return h; }

function control(q,s){
  const a=s.answers[q.kode];
  if(q.tipe==='SKALA_KEPUASAN'||q.tipe==='SKALA_PERSETUJUAN'){
    const sc=SCALES[q.scaleId];
    return `<div class="opts stars">`+sc.labels.map((l,i)=>
      `<label class="opt"><input type="radio" name="${q.kode}" data-kode="${q.kode}" data-kind="num" value="${i+1}" ${a&&a.number===i+1?'checked':''}>
        <span class="optbody"><span class="stars">${stars(i+1,sc.poin)}</span><span class="optlbl">${esc(l)}</span></span></label>`).join('')+`</div>`;
  }
  if(q.tipe==='NPS'){
    const sc=SCALES[q.scaleId];
    return `<div><div class="nps">`+sc.labels.map(l=>{const num=Number(l);
      return `<label class="npschip ${a&&a.number===num?'sel':''}"><input type="radio" name="${q.kode}" data-kode="${q.kode}" data-kind="num" value="${num}" ${a&&a.number===num?'checked':''} hidden>${l}</label>`;}).join('')+
      `</div><div class="npsends"><span>${esc(sc.endpointKiri||'')}</span><span>${esc(sc.endpointKanan||'')}</span></div></div>`;
  }
  if(q.tipe==='YA_TIDAK'){
    return `<div class="opts" style="flex-direction:row;gap:24px">`+['Ya','Tidak'].map(o=>
      `<label class="opt inline"><input type="radio" name="${q.kode}" data-kode="${q.kode}" data-kind="text" value="${o}" ${a&&a.text===o?'checked':''}>${o}</label>`).join('')+`</div>`;
  }
  if(q.tipe==='PILIHAN_TUNGGAL'){
    return `<div class="opts">`+q.options.map(o=>
      `<label class="opt inline"><input type="radio" name="${q.kode}" data-kode="${q.kode}" data-kind="text" value="${esc(o)}" ${a&&a.text===o?'checked':''}>${esc(o)}</label>`).join('')+`</div>`;
  }
  if(q.tipe==='PILIHAN_GANDA'){
    const sel=(a&&a.json)||[];
    return `<div class="opts">`+q.options.map(o=>
      `<label class="opt inline"><input type="checkbox" data-kode="${q.kode}" data-kind="multi" value="${esc(o)}" ${sel.includes(o)?'checked':''}>${esc(o)}</label>`).join('')+`</div>`;
  }
  if(q.tipe==='TEKS'){
    return `<textarea class="input ${s.errors[q.kode]?'err':''}" data-kode="${q.kode}" data-kind="text" placeholder="Input Jawaban">${esc((a&&a.text)||'')}</textarea>`;
  }
  return '';
}

function qnode(node,s){
  const q=node.q;
  if(!visible(q,s)) return '';
  if(q.tipe==='GRUP'){
    return `<div class="grp"><div class="grphead"><span class="qk" style="color:var(--text2);font-weight:600">${displayKode(q.kode)}</span> ${esc(q.teks)}</div>
      <div class="grpkids">${node.children.map(c=>qnode(c,s)).join('')}</div></div>`;
  }
  const dep = q.logic? `<span class="deps">muncul bila ${displayKode(q.logic.src)} = ${esc(q.logic.val)}</span>`:'';
  const err = s.errors[q.kode]? `<div class="errtext">Wajib diisi</div>`:'';
  return `<div class="qnode" data-q="${q.kode}">
    <div class="qtext"><span class="qk">${displayKode(q.kode)}</span>${esc(q.teks)}${q.wajib?'<span class="req">*</span>':''}${dep}</div>
    ${control(q,s)}${err}</div>`;
}

function buildTree(qs){
  const byParent={};
  qs.forEach(q=>{const k=q.parent||''; (byParent[k]=byParent[k]||[]).push(q);});
  const rec=(p)=> (byParent[p||'']||[]).map(q=>({q,children:rec(q.kode)}));
  return rec(null);
}

/* ---------- Render identitas ---------- */
function idHtml(f,i,s){
  const req=isIdReq(f)?'<span class="req">*</span>':'';
  let ctrl;
  if(f.sumber==='OTOMATIS'||f.sumber==='SISTEM'){
    const bill=/billing/i.test(f.nama);
    ctrl=`<div class="billrow"><input class="input ro" readonly value="${esc(autoValue(f))}">${bill?'<button class="btn-primary" type="button" data-bill="1">Preview</button>':''}</div>`;
  } else if(f.sumber==='PILIHAN'){
    const v=s.identity[i]||'';
    ctrl=`<select class="input ${s.errors['id_'+i]?'err':''}" data-id="${i}"><option value="">Pilih...</option>`+
      choiceOptions(f).map(o=>`<option ${v===o?'selected':''}>${esc(o)}</option>`).join('')+`</select>`;
  } else {
    ctrl=`<input class="input ${s.errors['id_'+i]?'err':''}" data-id="${i}" placeholder="${esc(f.nama)}" value="${esc(s.identity[i]||'')}">`;
  }
  const err = s.errors['id_'+i]?'<div class="errtext">Wajib diisi</div>':'';
  return `<div class="idrow"><label class="flbl">${esc(f.nama)}${req}</label>${ctrl}${err}</div>`;
}

/* ---------- Render form ---------- */
function render(sv){
  const s=getState(sv.id);
  const view=document.getElementById('view');
  const head = sv.catalog
    ? `<div class="formhead"><h2 class="title">Katalog Tipe</h2></div><p class="catnote">Satu contoh interaktif untuk tiap tipe pertanyaan, skala, dan sumber identitas.</p>`
    : `<div class="formhead"><h2 class="title">${esc(sv.nama)}</h2><span class="kode">${sv.kode}</span><span class="badge ${sv.status}">${sv.status}</span><span class="nota">${esc(sv.jenisNota)}</span></div>`;
  const petunjuk = sv.catalog ? '' : `
    <section class="blk"><h2 class="sec">A. Petunjuk</h2>
      <p class="lead">Pelanggan PT Pelabuhan Indonesia (Persero) yang terhormat,</p>
      <p class="lead">Terima kasih Anda telah meluangkan waktu untuk berpartisipasi dalam <b>${esc(sv.nama)}</b> tahun ${sv.periode}. Kami mohon kesediaan Anda untuk mengisi kuesioner ini dengan lengkap, jujur, dan apa adanya. Sebelum mengklik tombol submit, kami mohon Anda memeriksa kembali seluruh jawaban telah dijawab dengan lengkap.</p>
      <p class="lead muted">${esc(sv.deskripsi)}</p>
    </section><hr>`;
  view.innerHTML = `<div class="formcard">
    ${head}
    ${petunjuk}
    <section class="blk"><h2 class="sec">B. Identitas</h2>${sv.identity.map((f,i)=>idHtml(f,i,s)).join('')}</section>
    <hr>
    <section class="blk"><h2 class="sec">C. Pertanyaan${sv.catalog?'':' Umum'}</h2>
      <div class="qlist" id="qlist">${buildTree(sv.questions).map(n=>qnode(n,s)).join('')}</div></section>
    <div class="actions"><button class="btn-ghost" id="resetBtn" type="button">Reset</button>
      <button class="btn-primary" id="submitBtn" type="button">Submit</button></div>
    <div id="summary">${s.submitted?summaryHtml(s.submitted):''}</div>
  </div>`;
  wire(sv);
}

function rerenderQuestions(sv){
  const s=getState(sv.id);
  document.getElementById('qlist').innerHTML = buildTree(sv.questions).map(n=>qnode(n,s)).join('');
}

function wire(sv){
  const s=getState(sv.id);
  const card=document.querySelector('.formcard');
  card.addEventListener('change',(e)=>{
    const el=e.target;
    if(el.dataset.id!=null){ s.identity[el.dataset.id]=el.value; delete s.errors['id_'+el.dataset.id]; return; }
    const kode=el.dataset.kode; if(!kode||el.dataset.kind==='text') return;
    if(el.dataset.kind==='multi'){
      let arr=(s.answers[kode]&&s.answers[kode].json)?[...s.answers[kode].json]:[];
      if(el.checked) arr.push(el.value); else arr=arr.filter(x=>x!==el.value);
      s.answers[kode]={json:arr};
    } else if(el.dataset.kind==='num'){ s.answers[kode]={number:Number(el.value)}; }
    delete s.errors[kode];
    rerenderQuestions(sv);
  });
  card.addEventListener('input',(e)=>{
    const el=e.target;
    if(el.dataset.id!=null){ s.identity[el.dataset.id]=el.value; return; }
    if(el.dataset.kode&&el.dataset.kind==='text'){ s.answers[el.dataset.kode]={text:el.value}; }
  });
  card.addEventListener('click',(e)=>{
    if(e.target.dataset.bill){ alert('Pratinjau nota tagihan (simulasi).'); }
  });
  document.getElementById('resetBtn').onclick=()=>{ s.answers={}; s.identity={}; s.errors={}; s.submitted=null; render(sv); };
  document.getElementById('submitBtn').onclick=()=>submit(sv);
}

function submit(sv){
  const s=getState(sv.id); s.errors={};
  sv.identity.forEach((f,i)=>{ if(isIdReq(f) && !((s.identity[i]||'').trim())) s.errors['id_'+i]=1; });
  const vis=sv.questions.filter(q=>visible(q,s));
  vis.forEach(q=>{ if(q.tipe==='GRUP'||!q.wajib) return; if(empty(s.answers[q.kode])) s.errors[q.kode]=1; });
  const n=Object.keys(s.errors).length;
  if(n){ s.submitted=null; render(sv);
    document.getElementById('summary').innerHTML=`<div class="warnbar">Masih ada ${n} isian wajib yang kosong.</div>`;
    const first=document.querySelector('.input.err,[data-q] .errtext'); if(first) first.scrollIntoView({behavior:'smooth',block:'center'});
    return; }
  s.submitted={
    surveyId:sv.id, submittedAt:'2026-06-20T03:00:00.000Z',
    identitas: sv.identity.map((f,i)=>({nama:f.nama,sumber:f.sumber,nilai:(f.sumber==='OTOMATIS'||f.sumber==='SISTEM')?autoValue(f):(s.identity[i]||'')})),
    jawaban: vis.filter(q=>q.tipe!=='GRUP'&&!empty(s.answers[q.kode])).map(q=>{const a=s.answers[q.kode];return {kode:q.kode,teks:q.teks,valueText:a.text,valueNumber:a.number,valueJson:a.json};}),
  };
  render(sv);
  document.getElementById('summary').scrollIntoView({behavior:'smooth',block:'start'});
}

function fmtAns(a){ if(a.valueJson) return a.valueJson.join(', '); if(a.valueNumber!=null) return String(a.valueNumber); return a.valueText||'—'; }
function summaryHtml(p){
  return `<div class="okbar">✓ Simulasi berhasil — tidak ada data tersimpan.</div>
  <div class="sumbox">
    <p class="sumh">Identitas</p><dl>${p.identitas.map(it=>`<div class="sumrow"><dt>${esc(it.nama)}</dt><dd>${esc(it.nilai||'—')}</dd></div>`).join('')}</dl>
    <p class="sumh" style="margin-top:14px">Jawaban (${p.jawaban.length})</p>
    <ul style="list-style:none;padding:0;margin:0">${p.jawaban.map(a=>`<li class="sumli"><span class="k">${a.kode}</span>${esc(fmtAns(a))}</li>`).join('')}</ul>
    <details style="margin-top:12px"><summary>Lihat payload (responses/answers)</summary><pre>${esc(JSON.stringify(p,null,2))}</pre></details>
  </div>`;
}

/* ---------- Tabs ---------- */
let current=SURVEYS[0].id;
function renderTabs(){
  document.getElementById('tabs').innerHTML = SURVEYS.map(sv=>
    `<button class="tab ${sv.id===current?'active':''}" data-tab="${sv.id}">${sv.catalog?'Katalog Tipe':esc(sv.kode)}</button>`).join('');
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ current=b.dataset.tab; renderTabs(); render(SURVEYS.find(x=>x.id===current)); window.scrollTo({top:0,behavior:'smooth'}); });
}
renderTabs();
render(SURVEYS[0]);
</script>
